# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: CI/CD and release

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]

env:
    NAMESPACE_NAME: "freegamescatcher"
    IMAGE_NAME: "freegamescatcher-core"

jobs:
    build:
        name: ⚙️ Build application

        runs-on: ubuntu-latest

        steps:
            - name: 📥 Checkout repository
              uses: actions/checkout@v3

            - name: 🌐 Use Node.js LTS
              uses: actions/setup-node@v3
              with:
                  node-version: lts/*

            - name: 🗂 Cache "node_modules"
              uses: actions/cache@v3
              id: yarn-cache # use this to check for `cache-hit` (`steps.yarn-cache.outputs.cache-hit != 'true'`)
              with:
                  path: "**/node_modules"
                  key: ${{ runner.arch }}-${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
                  restore-keys: |
                      ${{ runner.arch }}-${{ runner.os }}-yarn-

            - name: 📦 Install dependencies
              if: steps.yarn-cache.outputs.cache-hit != 'true'
              run: yarn install --frozen-lockfile

            - name: ⚙️ Build application
              run: yarn run build

            - if: steps.yarn-cache.outputs.cache-hit != 'true'
              name: 🗃 List the state of node modules
              continue-on-error: true
              run: yarn list

    test-unit:
        name: 🧪 Unit tests

        runs-on: ubuntu-latest

        needs: build

        steps:
            - name: 📥 Checkout repository
              uses: actions/checkout@v3

            - name: 🌐 Use Node.js LTS
              uses: actions/setup-node@v3
              with:
                  node-version: lts/*

            - name: 🗂 Cache "node_modules"
              uses: actions/cache@v3
              with:
                  path: "**/node_modules"
                  key: ${{ runner.arch }}-${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
                  restore-keys: |
                      ${{ runner.arch }}-${{ runner.os }}-yarn-

            - name: 🧪 Run unit tests
              run: yarn run test:unit

    release:
        name: 🔖 Release application

        runs-on: ubuntu-latest

        needs: test-unit

        steps:
            - name: 📥 Checkout repository
              uses: actions/checkout@v3
              with:
                  # used by semantic-release to bypass the branch protection rules
                  token: ${{ secrets.GH_TOKEN }}

            - name: 🌐 Use Node.js LTS
              uses: actions/setup-node@v3
              with:
                  node-version: lts/*

            - name: 🗂 Cache "node_modules"
              uses: actions/cache@v3
              with:
                  path: "**/node_modules"
                  key: ${{ runner.arch }}-${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
                  restore-keys: |
                      ${{ runner.arch }}-${{ runner.os }}-yarn-

            - name: 🔖 Release application
              run: yarn run release
              env:
                  GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
                  # NPM_TOKEN: ${{ secrets.NPM_TOKEN }} # optional, needed to publish packages on npm
              id: version # save the version to use in an other step/job
        outputs:
            version: ${{ steps.version.outputs.nextVersion }}

    push:
        name: 🐳 Build and push image

        runs-on: ubuntu-latest

        needs: release

        steps:
            - name: 📥 Checkout repository
              uses: actions/checkout@v3

            - name: 🌳 Extract branch name
              shell: bash
              run: |
                  echo Branch name: ${{ github.head_ref }}
                  branch_name=${{ github.head_ref }} && branch_name_sanitized=${branch_name//\//-} 
                  echo Sanitized branch name: $branch_name_sanitized
                  echo branch_name=$branch_name_sanitized >> $GITHUB_OUTPUT
              id: branch_name

            - name: ⚙️ Set up QEMU
              uses: docker/setup-qemu-action@v2

            - name: 🛠 Set up Docker Buildx
              uses: docker/setup-buildx-action@v2

            - name: 📲 Login to DockerHub
              uses: docker/login-action@v2
              with:
                  username: ${{ secrets.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: 🐳 Build and push image ${{ steps.branch_name.outputs.branch_name }}
              uses: docker/build-push-action@v3
              with:
                  context: . # https://github.com/marketplace/actions/build-and-push-docker-images#git-context
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.branch_name.outputs.branch_name }}
                  build-args: |
                      NODE_ENV=pre-production
                      VERSION=${{ steps.branch_name.outputs.branch_name }}

            - name: 🐳 Build and push image ${{ needs.release.outputs.version }}
              uses: docker/build-push-action@v3
              if: ${{ needs.release.outputs.version }} # deploy only if there is a new published version
              with:
                  context: . # https://github.com/marketplace/actions/build-and-push-docker-images#git-context
                  platforms: linux/amd64,linux/arm64
                  push: true
                  tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.release.outputs.version }}
                  build-args: |
                      VERSION=${{ needs.release.outputs.version }}

        outputs:
            branch_name: ${{ steps.branch_name.outputs.branch_name }}

    deploy-prep:
        name: 🚀 Deploy prep. [${{ needs.push.outputs.branch_name }}]

        runs-on: ubuntu-latest

        needs: [release, push]

        environment: pre-production # refer to https://github.com/size-up/docs/settings/environments

        steps:
            - name: 🚀 Set image [${{ needs.push.outputs.branch_name }}] to pre-production
              uses: actions-hub/kubectl@master
              env:
                  KUBE_CONFIG: ${{ secrets.OCI_KUBE_CONFIG }}
              with:
                  args: set image -n ${{ env.NAMESPACE_NAME }} deployment/${{ env.IMAGE_NAME }}-prep ${{ env.IMAGE_NAME }}-prep=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.push.outputs.branch_name }}

            - name: 🚀 Rollout pre-production
              uses: actions-hub/kubectl@master
              env:
                  KUBE_CONFIG: ${{ secrets.OCI_KUBE_CONFIG }}
              with:
                  args: rollout -n ${{ env.NAMESPACE_NAME }} restart deployment ${{ env.IMAGE_NAME }}-prep

    deploy-prod:
        name: 🚀 Deploy prod. v${{ needs.release.outputs.version }}

        runs-on: ubuntu-latest

        needs: [release, push]

        if: ${{ needs.release.outputs.version }} # deploy only if there is a new published version

        environment: production # refer to https://github.com/size-up/docs/settings/environments

        steps:
            - name: 🚀 Deploy to production v${{ needs.release.outputs.version }}
              uses: actions-hub/kubectl@master
              env:
                  KUBE_CONFIG: ${{ secrets.OCI_KUBE_CONFIG }}
              with:
                  args: set image -n ${{ env.NAMESPACE_NAME }} deployment/${{ env.IMAGE_NAME }}-prod ${{ env.IMAGE_NAME }}-prod=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ needs.release.outputs.version }}
